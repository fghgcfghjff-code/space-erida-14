    sprite: _Erida/Clothing/Belt/inteq_droppouch.rsi
  - type: Clothing
    sprite: _Erida/Clothing/Belt/inteq_droppouch.rsi

- type: entity
  id: ClothingBeltInteQWebbingGrenadeFilled
  parent: ClothingBeltInteQWebbing
  name: grenadier chest rig
  suffix: Filled
  components:
  - type: Item
    size: Ginormous
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,7,1
  - type: StorageFill
    contents:
      - id: ExGrenade
        amount: 4
      - id: SyndieMiniBomb
        amount: 2
      - id: EmpGrenade
        amount: 2

